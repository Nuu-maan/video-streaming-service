  # ─────────────────────────── Moderation ───────────────────────────

  /reports:
    post:
      tags: [Moderation]
      operationId: createReport
      summary: File a report against a video, user, or comment
      description: >-
        Any authenticated user may report. At least one of `video_id`,
        `user_id`, `comment_id` is required. Filing the same report twice is a
        409.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_type, reason]
              properties:
                report_type:
                  $ref: "#/components/schemas/ReportType"
                reason:
                  type: string
                description:
                  type: string
                video_id:
                  type: string
                  format: uuid
                user_id:
                  type: string
                  format: uuid
                comment_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: The filed report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ContentReport"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Same reporter, same target (`DUPLICATE_REPORT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/reports/pending:
    get:
      tags: [Moderation]
      operationId: listPendingReports
      summary: Page of reports awaiting review
      description: Requires the `moderate_content` permission.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of pending reports
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ContentReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/reports/{id}/review:
    parameters:
      - name: id
        in: path
        required: true
        description: Report id
        schema:
          type: string
          format: uuid
    post:
      tags: [Moderation]
      operationId: reviewReport
      summary: Resolve or dismiss a report
      description: >-
        Requires `moderate_content`. `action: ban_user` additionally requires
        `manage_users` (checked in the handler) — without it the review is a
        403.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [delete_video, ban_user, warn_user, dismiss]
                notes:
                  type: string
      responses:
        "200":
          description: Report reviewed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                          report_id:
                            type: string
                            format: uuid
                          action:
                            type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing `moderate_content`, or `ban_user` without `manage_users` (`FORBIDDEN`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/users/{id}/ban:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      tags: [Moderation]
      operationId: banUser
      summary: Ban a user
      description: >-
        Requires `manage_users`. Empty `duration` means permanent; a duration
        is a positive Go duration string like `"72h"`. Banning yourself is
        rejected.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                duration:
                  type: string
                  description: 'Positive Go duration string, e.g. "72h". Omit for a permanent ban.'
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Self-ban or bad duration (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"


  # ─────────────────────────── Ops (server root, outside /api/v1) ───────────────────────────

  /health:
    servers:
      - url: http://localhost:8080
        description: Local development (server root — ops routes live outside /api/v1)
      - url: "{scheme}://{host}"
        description: Production (server root)
        variables:
          scheme:
            default: https
            enum: [https, http]
          host:
            default: api.example.com
    get:
      tags: [Ops]
      operationId: health
      summary: Readiness probe
      description: >-
        Mounted at the **server root**, not under `/api/v1`. Returns 503 when
        Postgres or Redis is unreachable, so an orchestrator can pull the
        instance out of rotation. Not wrapped in the JSON envelope.
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: A dependency is unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /metrics:
    servers:
      - url: http://localhost:8080
        description: Local development (server root — ops routes live outside /api/v1)
      - url: "{scheme}://{host}"
        description: Production (server root)
        variables:
          scheme:
            default: https
            enum: [https, http]
          host:
            default: api.example.com
    get:
      tags: [Ops]
      operationId: prometheusMetrics
      summary: Prometheus exposition
      description: Mounted at the **server root**. Plain-text Prometheus format.
      security: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /docs:
    servers:
      - url: http://localhost:8080
        description: Local development (server root — ops routes live outside /api/v1)
      - url: "{scheme}://{host}"
        description: Production (server root)
        variables:
          scheme:
            default: https
            enum: [https, http]
          host:
            default: api.example.com
    get:
      tags: [Ops]
      operationId: apiDocs
      summary: This API reference, as a self-contained HTML page
      description: >-
        Mounted at the **server root**. The page embeds all of its CSS and JS —
        no CDN assets — so it renders behind a strict CSP or with no egress.
      security: []
      responses:
        "200":
          description: The documentation page
          content:
            text/html:
              schema:
                type: string

  /openapi.yaml:
    servers:
      - url: http://localhost:8080
        description: Local development (server root — ops routes live outside /api/v1)
      - url: "{scheme}://{host}"
        description: Production (server root)
        variables:
          scheme:
            default: https
            enum: [https, http]
          host:
            default: api.example.com
    get:
      tags: [Ops]
      operationId: openapiSpec
      summary: This specification, raw
      description: Mounted at the **server root**.
      security: []
      responses:
        "200":
          description: The OpenAPI document
          content:
            application/yaml:
              schema:
                type: string

# ─────────────────────────── Components ───────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        `Authorization: Bearer <access_token>`. Obtain a token pair from
        `/auth/login` or `/auth/register`; renew with `/auth/refresh`.
        Access tokens live 900 s. A refresh token is not accepted here.

  parameters:
    Page:
      name: page
      in: query
      description: 1-based page number; values below 1 are clamped to 1
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Page size; clamped to at most 100
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    VideoId:
      name: id
      in: path
      required: true
      description: Video id
      schema:
        type: string
        format: uuid
    CommentId:
      name: id
      in: path
      required: true
      description: Comment id
      schema:
        type: string
        format: uuid
    UserId:
      name: id
      in: path
      required: true
      description: User id
      schema:
        type: string
        format: uuid
    PlaylistId:
      name: id
      in: path
      required: true
      description: Playlist id
      schema:
        type: string
        format: uuid
    Quality:
      name: quality
      in: path
      required: true
      description: Rendition quality
      schema:
        type: string
        enum: [360p, 480p, 720p, 1080p]

  responses:
    ValidationError:
      description: Malformed input (`VALIDATION_ERROR`)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Invalid request
    Unauthorized:
      description: Missing, invalid, expired or revoked access token (`UNAUTHORIZED`)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication required
    Forbidden:
      description: Authenticated, but lacking the required permission (`FORBIDDEN`)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Insufficient permissions
    NotFound:
      description: >-
        Resource not found (`NOT_FOUND`). Also the answer for a private video
        or playlist read by anyone but its owner — never 403.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Not found

  schemas:
    # ── Envelopes ──

    SuccessEnvelope:
      type: object
      description: 'Every non-media, non-list success response: `{"success": true, "data": ...}`'
      required: [success]
      properties:
        success:
          type: boolean
          const: true
        data:
          description: The payload; its shape is documented per endpoint

    PaginatedEnvelope:
      type: object
      description: >-
        Every list endpoint — including /search — wraps its page in this
        envelope.
      required: [success, data, pagination]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items: {}
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_previous:
          type: boolean

    ErrorResponse:
      type: object
      description: 'Every error: `{"success": false, "error": {"code", "message"}}`'
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            Machine-readable error code. `AUTH_UNAVAILABLE` arrives with
            status 503 when the token-revocation store is unreachable and the
            server fails closed — retry with the same token rather than
            discarding credentials as you would on a 401.
          enum:
            - VALIDATION_ERROR
            - BAD_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - INTERNAL_ERROR
            - ALREADY_EXISTS
            - USER_BANNED
            - DUPLICATE_REPORT
            - EMAIL_ALREADY_VERIFIED
            - INVALID_TOKEN
            - INVALID_CURRENT_PASSWORD
            - FILE_TOO_LARGE
            - INVALID_FORMAT
            - HLS_NOT_READY
            - PLAYLIST_NOT_FOUND
            - SEGMENT_NOT_FOUND
            - VIDEO_NOT_READY
            - FILE_NOT_FOUND
            - ALREADY_IN_PLAYLIST
            - AUTH_UNAVAILABLE
        message:
          type: string
          description: Human-readable explanation

    MessageResponse:
      description: A success envelope whose payload is a short confirmation
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                message:
                  type: string
              additionalProperties: true

    # ── Enums ──

    Role:
      type: string
      enum: [guest, user, premium, moderator, admin]

    VideoStatus:
      type: string
      enum: [uploading, processing, ready, failed]

    VideoVisibility:
      type: string
      enum: [public, private, unlisted]
      description: >-
        `private` answers 404 to everyone but the owner; `unlisted` is
        reachable by anyone with the link but excluded from listings and
        search.

    ReportType:
      type: string
      enum: [spam, harassment, hate_speech, violence, copyright, nudity, misinformation, other]

    NotificationType:
      type: string
      enum: [new_video, comment, reply, like, subscriber, mention]

    # ── Auth / account ──

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
          description: "JWT; send as `Authorization: Bearer <access_token>`"
        refresh_token:
          type: string
          description: Redeem at POST /auth/refresh; not usable as an API credential
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          description: Access-token lifetime in seconds (900)
        refresh_expires_in:
          type: integer
          description: Refresh-token lifetime in seconds (604800)
        user:
          $ref: "#/components/schemas/User"

    TokenPairResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TokenPair"

    User:
      type: object
      description: >-
        Password hashes, verification/reset tokens and moderation bookkeeping
        are never serialized.
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        email_verified:
          type: boolean
        last_login_at:
          type: string
          format: date-time
        oauth_provider:
          type: string
        oauth_avatar_url:
          type: string
        is_banned:
          type: boolean
        ban_reason:
          type: string
        ban_expiry:
          type: string
          format: date-time
        banned_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    # ── Videos ──

    Video:
      type: object
      description: >-
        Server-side storage keys (file path, HLS path, thumbnail path) are
        deliberately withheld; play the video via the computed `hls_url` and
        `thumbnail_url`.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        filename:
          type: string
        file_size:
          type: integer
          format: int64
        duration:
          type: integer
          description: Seconds
        status:
          $ref: "#/components/schemas/VideoStatus"
        visibility:
          $ref: "#/components/schemas/VideoVisibility"
        mime_type:
          type: string
        original_resolution:
          type: string
        transcoding_progress:
          type: integer
          minimum: 0
          maximum: 100
        available_qualities:
          type: array
          items:
            type: string
          description: 'Subset of ["360p", "480p", "720p", "1080p"]'
        hls_ready:
          type: boolean
        streaming_protocol:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        view_count:
          type: integer
          format: int64
        like_count:
          type: integer
          format: int64
        comment_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        processed_at:
          type: string
          format: date-time
        thumbnail_url:
          type: string
          description: >-
            Computed; present once a thumbnail exists.
            `/api/v1/videos/{id}/thumbnail`
        hls_url:
          type: string
          description: >-
            Computed; present once HLS is ready. Feed to hls.js / native HLS.
            `/api/v1/videos/{id}/hls/master.m3u8`

    VideoResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Video"

    VideoStatusReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/VideoStatus"
        progress:
          type: integer
          minimum: 0
          maximum: 100
        available_qualities:
          type: array
          items:
            type: string
        message:
          type: string
        thumbnail:
          type: string
          description: Server-side storage key; present only once a thumbnail is set

    ViewResult:
      type: object
      properties:
        counted:
          type: boolean
          description: true when the view was counted (201); false on a deduplicated repeat (200)

    # ── Social ──

    Like:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        is_like:
          type: boolean
          description: true = like, false = dislike
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:

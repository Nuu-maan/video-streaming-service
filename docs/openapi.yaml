  # ─────────────────────────── Discovery ───────────────────────────

  /search:
    get:
      tags: [Discovery]
      operationId: search
      summary: Full-text video search
      description: >-
        Searches public, ready videos. Answers in the standard paginated
        envelope like every other list endpoint.
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, newest, views, likes]
            default: relevance
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: tags
          in: query
          description: Comma-separated tag list
          schema:
            type: string
        - name: min_duration
          in: query
          description: Seconds; must be >= 0
          schema:
            type: integer
            minimum: 0
        - name: max_duration
          in: query

          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        content:
          type: string
        like_count:
          type: integer
          format: int64
        reply_count:
          type: integer
          format: int64
        pinned:
          type: boolean
        edited_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        username:
          type: string
        avatar_url:
          type: string

    SubscriptionEntry:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        avatar_url:
          type: string
        subscriber_count:
          type: integer
          format: int64
        notify_uploads:
          type: boolean
        subscribed_at:
          type: string
          format: date-time

    Playlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
        description:

openapi: 3.1.0

info:
  title: Video Streaming Service API
  version: 1.0.0
  contact:
    name: video-streaming-service
    url: https://github.com/Nuu-maan/video-streaming-service
  description: |
    Standalone JSON API for a video platform: accounts, uploads, transcoding,
    HLS/MP4 playback, comments, playlists, subscriptions, search, moderation
    and admin analytics. It is designed to be hosted on its own and consumed
    by a separate frontend (React, Next.js, Vue, ...) running on a different
    origin.

    ## The three things to know first

    1. **Auth is JWT Bearer.** Log in at `POST /auth/login` (the body field is
       `identifier` — a username *or* an email — plus `password`) and send
       `Authorization: Bearer <access_token>` on every authenticated call.
       Access tokens live 900 s; exchange the `refresh_token` at
       `POST /auth/refresh` for a new pair. A refresh token is *not* usable as
       an API credential, and an access token is rejected at `/auth/refresh`.

    2. **Every JSON response is wrapped in an envelope.**
       Success: `{"success": true, "data": ...}`.
       Lists (including `/search`): `{"success": true, "data": [...], "pagination": {"total", "page", "limit", "total_pages", "has_next", "has_previous"}}`.
       Errors: `{"success": false, "error": {"code": "...", "message": "..."}}`.
       Media routes (`.m3u8`, `.ts`, MP4, JPEG) return raw bytes, never the envelope.

    3. **Media URLs come back on the video object.** A ready video exposes
       computed `hls_url` (feed it to hls.js / Safari) and `thumbnail_url`.
       Server-side storage paths are deliberately withheld. Range requests are
       honoured on `/videos/{id}/stream/{quality}` (206 Partial Content), and
       CORS exposes `Content-Length`, `Content-Range`, `Accept-Ranges` and
       `X-Request-ID` so hls.js and seeking work cross-origin.

    ## Other conventions

    - The canonical prefix is `/api/v1`. Bare `/api` is a legacy alias onto the
      same handlers; new integrations should use `/api/v1`.
    - Pagination: `page` (default 1, min 1) and `limit` (default 20, max 100),
      clamped silently. Exception: `/admin/analytics/top-videos` defaults to 10,
      caps at 50, and rejects a malformed `limit` with 400.
    - **Private videos and playlists answer 404 — never 403 — to anyone but
      their owner**, on every read and every media route, so their existence is
      not leaked. `unlisted` content is reachable by anyone with the link.
    - Playback does **not** auto-count views. Record a view explicitly with
      `POST /videos/{id}/view` (anonymous callers must send a `session_id`);
      it answers 201 when counted and 200 when deduplicated.
    - Roles: `guest`, `user`, `premium`, `moderator`, `admin`. Admin accounts
      are bootstrapped with the `cmd/admin` CLI
      (`admin promote --username alice --role admin`), not raw SQL.
    - CORS origins are allowlisted server-side; allowed request headers include
      `Authorization`, `Content-Type` and `Range`.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: "{scheme}://{host}/api/v1"
    description: Production
    variables:
      scheme:
        default: https
        enum: [https, http]
      host:
        default: api.example.com
        description: Wherever you host the API binary

tags:
  - name: Auth
    description: Register, log in, refresh, and end sessions.
  - name: Account
    description: Email verification, password recovery and password change.
  - name: Videos
    description: Video metadata — list, read, upload, delete, processing status.
  - name: Streaming
    description: >-
      Raw media: HLS playlists and segments, progressive MP4 (Range → 206),
      and thumbnails. These routes return bytes, not the JSON envelope.
  - name: Social
    description: Comments, subscriptions, playlists and notifications.
  - name: Discovery
    description: Search, suggestions, categories, trending, related and the subscription feed.
  - name: Engagement
    description: Views, resume progress, likes, watch-later and watch history.
  - name: Moderation
    description: User-filed reports, report review, and user bans.
  - name: Admin
    description: Queue operations, platform analytics and infrastructure monitoring.
  - name: Ops
    description: Health, Prometheus metrics and this documentation. Served at the server root, outside /api/v1.

security: []

paths:
  # ─────────────────────────── Auth ───────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Create an account and return tokens
      description: >-
        Registers a new account and immediately returns a token pair, so no
        separate login round-trip is needed. Usernames must match
        `^[a-zA-Z0-9_]{3,30}$`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 30
                  pattern: "^[a-zA-Z0-9_]{3,30}$"
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          description: The account is banned (`USER_BANNED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken (`ALREADY_EXISTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Exchange credentials for tokens
      description: >-
        **The credential field is `identifier`, not `username`** — it accepts a
        username or an email. Unknown account and wrong password return the
        same 401 body, so account existence cannot be probed.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier:
                  type: string
                  description: Username **or** email
                password:
                  type: string
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The account is banned (`USER_BANNED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Exchange a refresh token for a new token pair
      description: >-
        Takes `{"refresh_token": "..."}` and returns a full new token pair.
        An **access** token presented here is rejected with 401, just as a
        **refresh** token presented as an API credential is rejected with 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Invalid, expired or revoked refresh token — or an access token was presented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Return the authenticated caller's own account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The caller's account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the presented access token
      description: >-
        Revokes the access token in the `Authorization` header. The body is
        optional; when it carries a `refresh_token`, that token is revoked too.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout-all:
    post:
      tags: [Auth]
      operationId: logoutAll
      summary: Revoke every outstanding session for the caller, on every device
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────── Account ───────────────────────────

  /auth/verify-email/send:
    post:
      tags: [Account]
      operationId: sendVerificationEmail
      summary: (Re)send a verification email
      description: Sends the verification mail to the caller's own registered address.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Address already verified (`EMAIL_ALREADY_VERIFIED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      tags: [Account]
      operationId: verifyEmail
      summary: Consume a verification token and mark the account verified
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Bad or expired token (`INVALID_TOKEN`) or malformed body (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      tags: [Account]
      operationId: forgotPassword
      summary: Start a password reset
      description: >-
        Always answers 200 with the same body whether or not the address is
        registered, so accounts cannot be enumerated.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Accepted (same body regardless of whether the address exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /auth/reset-password:
    post:
      tags: [Account]
      operationId: resetPassword
      summary: Consume a reset token and set a new password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Password reset; log in again with the new password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Bad token (`INVALID_TOKEN`) or weak password (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/change-password:
    post:
      tags: [Account]
      operationId: changePassword
      summary: Change password after verifying the current one
      description: Carries the stricter auth rate limit on top of the normal API budget.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Wrong current password (`INVALID_CURRENT_PASSWORD`) or weak new password (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────── Videos ───────────────────────────

  /videos:
    get:
      tags: [Videos]
      operationId: listVideos
      summary: List videos
      description: >-
        Auth is optional. Anonymous callers see only public videos; with a
        token and `mine=true` the filter switches to the caller's own videos,
        all visibilities included.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VideoStatus"
        - name: mine
          in: query
          description: '`"true"` lists the caller''s own videos (requires a token)'
          schema:
            type: string
            enum: ["true"]
      responses:
        "200":
          description: Page of videos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Video"
        "500":
          description: Internal error (`INTERNAL_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/upload:
    post:
      tags: [Videos]
      operationId: uploadVideo
      summary: Upload a video for transcoding
      description: >-
        Multipart upload, queued for transcoding by the worker. Requires the
        `upload_video` permission and carries an extra upload rate limit.
        Title 1–255 chars. The size limit is deployment-configured
        (`STORAGE_MAX_FILE_SIZE`, default 2 GiB; hard ceiling 10 GiB). The
        response video starts in status `uploading` — poll
        `GET /videos/{id}/status` for progress.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video, title]
              properties:
                video:
                  type: string
                  format: binary
                  description: The video file
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                visibility:
                  $ref: "#/components/schemas/VideoVisibility"
      responses:
        "201":
          description: Video accepted (status `uploading`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: File exceeds the configured size limit (`FILE_TOO_LARGE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: Not an accepted video format (`INVALID_FORMAT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [Videos]
      operationId: getVideo
      summary: Get one video
      description: >-
        Auth is optional; a token lets the owner read their own private video.
        **Private videos answer 404 — never 403 — to everyone else**, so their
        existence is not leaked. Unlisted videos resolve for anyone with the
        link. A ready video carries `hls_url` and `thumbnail_url` for playback.
      responses:
        "200":
          description: The video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Videos]
      operationId: deleteVideo
      summary: Delete a video
      description: >-
        Owner only, unless the caller holds `delete_any_video` (checked in the
        handler).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Video deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{id}/status:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [Videos]
      operationId: getVideoStatus
      summary: Transcoding progress for a video
      description: >-
        Poll this after an upload. Auth is optional; private videos 404 for
        non-owners exactly like `GET /videos/{id}`.
      responses:
        "200":
          description: Processing status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/VideoStatusReport"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────── Engagement ───────────────────────────

  /videos/{id}/view:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    post:
      tags: [Engagement]
      operationId: recordView
      summary: Record one view (explicit — playback does not auto-count)
      description: >-
        Views are deduplicated in Redis. Auth is optional: authenticated
        callers are deduped by user id; **anonymous callers must send a
        `session_id`**. The body must be JSON, even if just `{}` for an
        authenticated caller. **201 = counted, 200 = deduplicated repeat.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quality:
                  type: string
                source:
                  type: string
                session_id:
                  type: string
                  description: Required for anonymous callers
      responses:
        "201":
          description: View counted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ViewResult"
        "200":
          description: Duplicate within the dedupe window — not counted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ViewResult"
        "400":
          description: Missing `session_id` for an anonymous caller, or non-JSON body (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{id}/progress:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    post:
      tags: [Engagement]
      operationId: saveProgress
      summary: Upsert the caller's resume position
      description: >-
        `position` and `duration` are non-negative seconds and **`position`
        must lie within `duration`**, otherwise the request is a 400.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                position:
                  type: integer
                  minimum: 0
                  description: Seconds; must not exceed `duration`
                duration:
                  type: integer
                  minimum: 0
                  description: Seconds
                completed:
                  type: boolean
      responses:
        "200":
          description: Progress saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Negative values, or `position` beyond `duration` (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{id}/like:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    put:
      tags: [Engagement]
      operationId: setLike
      summary: Upsert the caller's rating
      description: >-
        `is_like: false` is a dislike. The field is a pointer server-side, so
        the key must be present explicitly — `true` or `false`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_like]
              properties:
                is_like:
                  type: boolean
                  description: true = like, false = dislike; the key is required
      responses:
        "200":
          description: The stored rating
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Like"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Engagement]
      operationId: getLike
      summary: Get the caller's current rating of a video
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The caller's rating
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Like"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not rated (`NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Engagement]
      operationId: removeLike
      summary: Clear the caller's rating of a video
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rating removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not rated (`NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}/watch-later:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    put:
      tags: [Engagement]
      operationId: addWatchLater
      summary: Save a video to watch-later (idempotent)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Engagement]
      operationId: removeWatchLater
      summary: Remove a video from watch-later
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not in the list (`NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/watch-later:
    get:
      tags: [Engagement]
      operationId: listWatchLater
      summary: The caller's watch-later list, most recently saved first
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of saved videos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WatchLaterItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/history:
    get:
      tags: [Engagement]
      operationId: getHistory
      summary: Watch history, most recently watched first
      description: An empty history serialises as `[]`, never `null`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of history entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WatchHistory"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Engagement]
      operationId: clearHistory
      summary: Delete the caller's entire watch history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/history/{videoId}:
    delete:
      tags: [Engagement]
      operationId: deleteHistoryEntry
      summary: Remove one video from the caller's watch history
      security:
        - bearerAuth: []
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entry removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────── Streaming ───────────────────────────

  /videos/{id}/hls/master.m3u8:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [Streaming]
      operationId: getHlsMaster
      summary: HLS master playlist
      description: >-
        Feed this URL (it comes back as `hls_url` on the video object) to
        hls.js or a native HLS player. Auth is optional; a private video 404s
        for non-owners. Returns raw m3u8 text — not the JSON envelope.
        Cached `public, max-age=3600`. Streaming routes carry a much higher
        rate-limit budget than the rest of the API.
      responses:
        "200":
          description: Master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Video not found / not visible (`NOT_FOUND`), transcoding not finished (`HLS_NOT_READY`), or playlist missing (`PLAYLIST_NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}/hls/{quality}/playlist.m3u8:
    parameters:
      - $ref: "#/components/parameters/VideoId"
      - $ref: "#/components/parameters/Quality"
    get:
      tags: [Streaming]
      operationId: getHlsQualityPlaylist
      summary: HLS media playlist for one quality
      description: Auth optional; private videos 404 for non-owners. Raw m3u8 text.
      responses:
        "200":
          description: Media playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
        "400":
          description: Quality not one of 360p|480p|720p|1080p (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "`NOT_FOUND`, `HLS_NOT_READY` or `PLAYLIST_NOT_FOUND`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}/hls/{quality}/{segment}:
    parameters:
      - $ref: "#/components/parameters/VideoId"
      - $ref: "#/components/parameters/Quality"
      - name: segment
        in: path
        required: true
        description: Segment file name; must match `^segment_\d{3}\.ts$`
        schema:
          type: string
          pattern: '^segment_\d{3}\.ts$'
    get:
      tags: [Streaming]
      operationId: getHlsSegment
      summary: HLS segment
      description: >-
        MPEG-TS bytes with immutable cache headers
        (`max-age=31536000, immutable`). Served via `http.ServeContent`, so
        `Range` requests answer 206. Auth optional; private videos 404 for
        non-owners.
      responses:
        "200":
          description: Segment bytes
          content:
            video/MP2T:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content for a `Range` request
          content:
            video/MP2T:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: "`SEGMENT_NOT_FOUND` or `HLS_NOT_READY`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}/stream/{quality}:
    parameters:
      - $ref: "#/components/parameters/VideoId"
      - $ref: "#/components/parameters/Quality"
    get:
      tags: [Streaming]
      operationId: streamMp4
      summary: Progressive MP4 fallback
      description: >-
        Plain MP4 for players without HLS. **Honours `Range` and answers 206**,
        which is what makes seeking work; CORS exposes `Content-Range` and
        `Accept-Ranges` so this works cross-origin. The quality must be present
        in the video's `available_qualities` and the video must be `ready`.
        Auth optional; private videos 404 for non-owners.
      parameters:
        - name: Range
          in: header
          required: false
          description: 'Standard byte range, e.g. `bytes=0-1023`'
          schema:
            type: string
      responses:
        "200":
          description: Whole file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content for a `Range` request (with `Content-Range`)
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "400":
          description: Quality invalid or not in `available_qualities` (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "`NOT_FOUND`, `VIDEO_NOT_READY` or `FILE_NOT_FOUND`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}/thumbnail:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [Streaming]
      operationId: getThumbnail
      summary: Poster image
      description: >-
        JPEG with immutable cache headers (`max-age=86400`). A thumbnail is a
        frame of the video, so it is exactly as private as the video: same
        visibility check, private 404s for non-owners. This URL comes back as
        `thumbnail_url` on the video object.
      responses:
        "200":
          description: JPEG bytes
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Video not visible, or thumbnail not generated yet (`NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"


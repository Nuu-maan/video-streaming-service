# Reverse proxy for the Go API. This is the config the production compose
# stack mounts as /etc/nginx/nginx.conf. The repo-root nginx.conf is left
# untouched: it fronts MinIO for the local-dev compose stack and its rate
# limits never see an API request, which is exactly why this file exists.
#
# TLS is intentionally out of scope here — terminate it in front of this
# (cloud load balancer, or add a certbot/caddy layer) and keep this listener
# on plain :80 inside the compose network.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types application/json application/vnd.apple.mpegurl text/plain;

    # Edge rate limits are a coarse backstop; the fine-grained per-rule limits
    # live in the API process itself (internal/middleware).
    limit_req_zone $binary_remote_addr zone=api_edge:10m rate=120r/s;
    limit_req_zone $binary_remote_addr zone=upload_edge:10m rate=10r/m;

    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # STORAGE_MAX_FILE_SIZE is 2147483648 bytes (2 GiB); 2200m leaves
        # headroom for multipart framing so a max-size video is not rejected
        # at the edge while still passing the API's own check. If you change
        # STORAGE_MAX_FILE_SIZE, change this with it.
        client_max_body_size 2200m;

        # The API sets X-Forwarded-* trust expectations: Gin must be told
        # which proxies to trust (engine.SetTrustedProxies with this
        # container's network) or c.ClientIP() honours any spoofed
        # X-Forwarded-For a client sends — which would let one attacker
        # rotate through the entire rate-limit keyspace.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        location = /health {
            access_log off;
            proxy_pass http://api_backend;
        }

        # Prometheus exposition is for the internal scraper, not the internet.
        location = /metrics {
            deny all;
        }

        # Both spellings of the upload route: the API mounts its surface at
        # /api (legacy alias) and /api/v1 (canonical), and an upload through
        # either must stream, not spool.
        location ~ ^/api(/v1)?/videos/upload$ {
            limit_req zone=upload_edge burst=5 nodelay;

            # Without this nginx spools the entire multipart body to its own
            # disk before Go reads the first byte — doubling disk usage and
            # making every upload wait twice. Stream it straight through.
            proxy_request_buffering off;

            # A 2 GiB upload on a home connection takes a long time; these
            # are per-read/write idle timeouts, not totals, so they only
            # need to survive a stall, not the whole transfer.
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
            client_body_timeout 300s;

            proxy_pass http://api_backend;
        }

        # There is deliberately NO location serving /uploads from disk.
        #
        # Serving the shared volume directly is tempting: it is faster, and it
        # keeps segment traffic off the Go process entirely. It is also a total
        # bypass of the API's access control. The uploads tree holds every
        # video's raw original next to its transcoded renditions, and the
        # filesystem knows nothing about who owns what — so a `location /uploads/`
        # hands out private videos, and the untranscoded source files, to anyone
        # who can guess a path. The API refuses those exact requests, which is
        # why routing around it is not a shortcut but a hole. An identical static
        # route was removed from the Go router for the same reason.
        #
        # All media therefore goes through the API, which resolves the video,
        # checks who is asking, and reads through the storage backend:
        #   /api/v1/videos/:id/hls/master.m3u8
        #   /api/v1/videos/:id/hls/:quality/:segment
        #   /api/v1/videos/:id/stream/:quality       (Range -> 206)
        #   /api/v1/videos/:id/thumbnail
        # It sets the cache headers itself, and gets the polarity right, which is
        # easy to invert: playlists are short-cached because they are rewritten
        # while a video is processing, whereas segments never change and are
        # cached hard.
        #
        # To reclaim nginx's speed without reopening the hole, use
        # X-Accel-Redirect: let the API authenticate the request and answer with
        # an internal redirect that nginx then serves from disk. That needs an
        # `internal;` location here plus the matching header from the handler —
        # a real change, not a config tweak, and worth making only once segment
        # volume actually justifies it.
        location / {
            limit_req zone=api_edge burst=200 nodelay;
            proxy_read_timeout 60s;
            proxy_pass http://api_backend;
        }
    }
}

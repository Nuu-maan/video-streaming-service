name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch rather than paying for both.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Fail on anything gofmt would rewrite, rather than reformatting in CI and
      # letting the branch drift from what the author committed.
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./pkg)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            gofmt -d ./cmd ./internal ./pkg
            exit 1
          fi

      # Verifies go.mod/go.sum are complete and tidy. A missing require here is
      # what made the module fail to build for its entire history.
      - name: Verify dependencies are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'cache=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    proxy_cache_path /var/cache/nginx/videos levels=1:2 keys_zone=video_cache:100m max_size=10g inactive=30d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/thumbnails levels=1:2 keys_zone=thumb_cache:50m max_size=2g inactive=7d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=500m inactive=1h use_temp_path=off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=300r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript application/vnd.apple.mpegurl;

    upstream minio_backend {
        server minio:9000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location ~* ^/videos-processed/(.+\.m3u8)$ {
            proxy_cache video_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$uri";
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";

            limit_req zone=stream_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location ~* ^/videos-processed/(.+\.ts)$ {
            proxy_cache video_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$uri";
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";

            limit_req zone=stream_limit burst=100 nodelay;
            limit_conn conn_limit 30;

            proxy_pass http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        location ~* ^/thumbnails/ {
            proxy_cache thumb_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$uri";

            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=604800";
            add_header Access-Control-Allow-Origin "*";

            proxy_pass http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location ~* ^/videos-raw/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            client_max_body_size 0;
        }

        location /minio/ {
            rewrite ^/minio/(.*) /$1 break;
            proxy_pass http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location = /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
